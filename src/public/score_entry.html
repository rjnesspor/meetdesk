<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeetDesk - Score Entry</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
        integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/control_panel.css">
    <style>
        body {
            min-height: 100vh;
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
        }

        .entry-topbar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-shrink: 0;
        }

        .entry-topbar-logo {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .entry-topbar-logo span {
            color: var(--accent);
        }

        .entry-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            justify-content: center;
        }

        .entry-meta-item {
            text-align: center;
        }

        .entry-meta-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .entry-meta-value {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .entry-body {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            align-content: start;
        }

        @media (max-width: 600px) {
            .entry-body {
                grid-template-columns: 1fr;
            }
        }

        .entry-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .entry-card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .entry-card-header i {
            color: var(--text-muted);
            font-size: 15px;
        }

        .entry-card-body {
            padding: 20px;
        }

        .search-input {
            font-size: 28px;
            font-family: var(--font-mono);
            font-weight: 500;
            padding: 16px 18px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .search-input::placeholder {
            font-size: 18px;
            letter-spacing: 0;
            font-family: var(--font-body);
        }

        .search-btn {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            justify-content: center;
            margin-top: 12px;
        }

        .athlete-display {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 24px;
        }

        .athlete-display.has-athlete {
            border-color: var(--accent);
            background: var(--accent-dimmer);
        }

        .athlete-display-item {}

        .athlete-display-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .athlete-display-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: var(--font-mono);
        }

        .athlete-display-value.name-value {
            font-family: var(--font-body);
            font-size: 18px;
        }

        .score-input {
            font-size: 48px;
            font-family: var(--font-mono);
            font-weight: 500;
            padding: 20px;
            text-align: center;
            letter-spacing: 0.04em;
            width: 100%;
        }

        .score-input::placeholder {
            font-size: 36px;
            letter-spacing: 0;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            font-size: 17px;
            justify-content: center;
            margin-top: 14px;
            border-radius: var(--radius-md);
        }

        .submit-btn i {
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div class="entry-topbar">
        <div class="entry-topbar-logo">Meet<span>Desk</span></div>
        <div class="entry-meta">
            <div class="entry-meta-item">
                <div class="entry-meta-label">Event</div>
                <div class="entry-meta-value" id="entry-event-name">—</div>
            </div>
            <div class="entry-meta-item">
                <div class="entry-meta-label">Judge</div>
                <div class="entry-meta-value" id="entry-judge-number">—</div>
            </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Logout
        </button>
    </div>

    <div class="entry-body">

        <div class="entry-card">
            <div class="entry-card-header">
                <i class="bi bi-search"></i> Find Athlete
            </div>
            <div class="entry-card-body">
                <form onsubmit="searchAthlete(event)">
                    <input type="number" class="form-control search-input" id="search-bib" placeholder="Bib #"
                        autocomplete="off" required>
                    <button type="submit" class="btn btn-ghost search-btn">
                        <i class="bi bi-search"></i> Search
                    </button>
                </form>
            </div>
        </div>

        <div class="entry-card">
            <div class="entry-card-header">
                <i class="bi bi-pencil"></i> Enter Score
            </div>
            <div class="entry-card-body">
                <div class="athlete-display" id="athlete-display">
                    <div class="athlete-display-item">
                        <div class="athlete-display-label">Bib</div>
                        <div class="athlete-display-value" id="selected-bib">—</div>
                    </div>
                    <div class="athlete-display-item">
                        <div class="athlete-display-label">Athlete</div>
                        <div class="athlete-display-value name-value" id="selected-name">—</div>
                    </div>
                </div>

                <form onsubmit="addScore(event)">
                    <input type="number" class="form-control score-input" id="score-value" step="0.001" min="0" max="20"
                        placeholder="0.000" required>
                    <button type="submit" class="btn btn-success submit-btn" id="submit-score-btn" disabled>
                        <i class="bi bi-check-lg"></i> Submit Score
                    </button>
                </form>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = '';

        async function searchAthlete(e) {
            e.preventDefault();
            const bib = document.getElementById('search-bib').value;
            const eventId = localStorage.getItem('event_id');
            const judgeNumber = localStorage.getItem('judge_number');

            try {
                const res = await fetch(`${API_BASE}/api/athletes?bib_number=${bib}`);
                const athletes = await res.json();

                if (athletes.length === 0) {
                    showToast('No athlete found with that bib number', 'danger');
                    return;
                }

                const athlete = athletes[0];

                // Check for existing score from this judge for this event
                const scoreRes = await fetch(`${API_BASE}/api/scores?bib_number=${bib}&event_id=${eventId}&judge_number=${judgeNumber}`);
                const existingScores = await scoreRes.json();

                if (existingScores.length > 0) {
                    document.getElementById('score-value').value = existingScores[0].score;
                } else {
                    document.getElementById('score-value').value = '';
                }

                document.getElementById('selected-bib').textContent = athlete.bib_number;
                document.getElementById('selected-name').textContent = `${athlete.first_name} ${athlete.last_name}`;
                document.getElementById('athlete-display').classList.add('has-athlete');
                document.getElementById('submit-score-btn').disabled = false;
                document.getElementById('score-value').focus();

            } catch (err) {
                console.error('Error searching athlete:', err);
                showToast('Error looking up athlete', 'danger');
            }
        }

        async function addScore(e) {
            e.preventDefault();

            const score = {
                bib_number: parseInt(document.getElementById('selected-bib').textContent),
                event_id: parseInt(localStorage.getItem('event_id')),
                score: parseFloat(document.getElementById('score-value').value),
                judge_number: parseInt(localStorage.getItem('judge_number'))
            };

            try {
                const res = await fetch(`${API_BASE}/api/scores`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(score)
                });

                if (res.ok) {
                    document.getElementById('search-bib').value = '';
                    document.getElementById('score-value').value = '';
                    document.getElementById('selected-bib').textContent = '—';
                    document.getElementById('selected-name').textContent = '—';
                    document.getElementById('athlete-display').classList.remove('has-athlete');
                    document.getElementById('submit-score-btn').disabled = true;
                    document.getElementById('search-bib').focus();
                    showToast('Score saved!', 'success');
                } else {
                    showToast('Error: ' + await res.text(), 'danger');
                }
            } catch (err) {
                console.error('Error saving score:', err);
                showToast('Network error', 'danger');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/score_login.html';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: 'bi-check-circle', danger: 'bi-exclamation-circle', info: 'bi-info-circle' };
            toast.innerHTML = `<i class="bi ${icons[type] ?? 'bi-info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const eventId = localStorage.getItem('event_id');
            const judgeNumber = localStorage.getItem('judge_number');
            const eventName = localStorage.getItem('event_name');

            if (!eventId || !judgeNumber) {
                window.location.href = '/score_login.html';
                return;
            }

            document.getElementById('entry-event-name').textContent = eventName;
            document.getElementById('entry-judge-number').textContent = `J${judgeNumber}`;
        });
    </script>

</body>

</html>
