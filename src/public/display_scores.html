<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Display — MeetDesk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

        :root {
            --bg: #0e0f11;
            --surface: #141518;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #4f8ef7;
            --accent-dim: rgba(79, 142, 247, 0.12);
            --green: #3ecf8e;
            --green-dim: rgba(62, 207, 142, 0.08);
            --text-primary: #f0f1f5;
            --text-dim: #9095a3;
            --text-muted: #4a4e5a;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: none;
        }

        .screen.active {
            display: flex;
        }

        #screen-holding {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--bg);
        }

        .holding-event {
            font-size: clamp(48px, 10vw, 100px);
            font-family: var(--font-mono);
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.04em;
        }

        .holding-label {
            font-size: clamp(14px, 2vw, 22px);
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .holding-queue-badge {
            margin-top: 8px;
            font-size: clamp(12px, 1.4vw, 16px);
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 100px;
            display: none;
        }

        .holding-queue-badge.visible {
            display: block;
        }

        #screen-score {
            flex-direction: column;
        }

        .score-topbar {
            padding: clamp(12px, 2vh, 24px) clamp(20px, 4vw, 48px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .score-topbar-event {
            font-size: clamp(13px, 1.6vw, 18px);
            font-weight: 600;
            color: var(--accent);
            font-family: var(--font-mono);
            letter-spacing: 0.04em;
        }

        .score-topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .queue-indicator {
            font-size: clamp(11px, 1.2vw, 14px);
            color: var(--text-muted);
            display: none;
        }

        .queue-indicator.visible {
            display: block;
        }

        .queue-indicator strong {
            color: var(--accent);
            font-weight: 600;
        }

        .progress-bar-wrap {
            height: 2px;
            background: var(--border);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--accent);
            width: 100%;
            transform-origin: left;
        }

        .progress-bar-fill.running {
            transition: transform linear;
            transform: scaleX(0);
        }

        .score-body {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 0;
        }

        .score-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 4vw, 60px);
            gap: clamp(8px, 1.5vh, 20px);
        }

        .score-col-left {
            border-right: 1px solid var(--border);
        }

        .score-col-label {
            font-size: clamp(10px, 1.2vw, 14px);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .score-value {
            font-size: clamp(80px, 18vw, 200px);
            font-family: var(--font-mono);
            font-weight: 500;
            color: var(--green);
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .score-event {
            font-size: clamp(60px, 14vw, 160px);
            font-family: var(--font-mono);
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
            letter-spacing: 0.04em;
        }

        /* Athlete info */
        .score-name {
            font-size: clamp(22px, 4vw, 52px);
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.2;
        }

        .score-meta {
            display: flex;
            gap: clamp(12px, 2vw, 24px);
            align-items: center;
        }

        .score-meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .score-meta-label {
            font-size: clamp(9px, 1vw, 12px);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .score-meta-value {
            font-size: clamp(14px, 2vw, 22px);
            font-weight: 500;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .esc-hint {
            position: fixed;
            bottom: 16px;
            right: 20px;
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="screen-holding" class="screen active">
        <div class="holding-label">Now Scoring</div>
        <div class="holding-event" id="holding-event-name">—</div>
        <div class="holding-queue-badge" id="holding-queue-badge"></div>
    </div>

    <div id="screen-score" class="screen">
        <div class="score-topbar">
            <div class="score-topbar-event" id="score-topbar-event">—</div>
            <div class="score-topbar-right">
                <div class="queue-indicator" id="queue-indicator"></div>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>

        <div class="score-body">
            <div class="score-col score-col-left">
                <div class="score-col-label">Score</div>
                <div class="score-value" id="display-score">—</div>
                <div class="score-event" id="display-event">—</div>
            </div>

            <div class="score-col score-col-right">
                <div class="score-col-label">Athlete</div>
                <div class="score-name" id="display-name">—</div>
                <div class="score-meta">
                    <div class="score-meta-item">
                        <span class="score-meta-label">Bib</span>
                        <span class="score-meta-value" id="display-bib">—</span>
                    </div>
                    <div class="score-meta-item">
                        <span class="score-meta-label">Team</span>
                        <span class="score-meta-value" id="display-team">—</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="esc-hint">ESC to exit</div>

    <script>
        const API_BASE = '';

        // Duration is set per-session from display_login, stored in localStorage.
        // To accommodate a future "any scores" mode, eventId could be made optional.
        const eventId = parseInt(localStorage.getItem('display_event_id'));
        const eventName = localStorage.getItem('display_event_name') ?? '—';
        const DURATION_MS = (parseInt(localStorage.getItem('display_duration')) || 8) * 1000;

        if (!eventId) {
            window.location.href = '/display_login.html';
        }

        const queue = [];
        let displaying = false;
        let timer = null;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showHolding() {
            displaying = false;
            updateQueueBadge();
            showScreen('screen-holding');
        }

        function updateQueueBadge() {
            const badge = document.getElementById('holding-queue-badge');
            if (queue.length > 0) {
                badge.textContent = `${queue.length} score${queue.length > 1 ? 's' : ''} queued`;
                badge.classList.add('visible');
            } else {
                badge.classList.remove('visible');
            }
        }

        function enqueue(score) {
            queue.push(score);
            updateQueueBadge();
            updateQueueIndicator();
            if (!displaying) processQueue();
        }

        function processQueue() {
            if (queue.length === 0) {
                showHolding();
                return;
            }

            displaying = true;
            const score = queue.shift();
            renderScore(score);
            updateQueueIndicator();
            updateQueueBadge();

            startProgressBar();
            clearTimeout(timer);
            timer = setTimeout(processQueue, DURATION_MS);
        }

        function updateQueueIndicator() {
            const el = document.getElementById('queue-indicator');
            if (queue.length > 0) {
                el.innerHTML = `<strong>${queue.length}</strong> more in queue`;
                el.classList.add('visible');
            } else {
                el.classList.remove('visible');
            }
        }

        function startProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.classList.remove('running');
            bar.style.transitionDuration = '';
            bar.style.transform = 'scaleX(1)';

            void bar.offsetWidth;
            bar.classList.add('running');
            bar.style.transitionDuration = `${DURATION_MS}ms`;
            bar.style.transform = 'scaleX(0)';
        }

        function renderScore(score) {
            document.getElementById('display-score').textContent = score.score.toFixed(3);
            document.getElementById('display-event').textContent = getEventShorthand(score.event_name);
            document.getElementById('display-name').textContent = `${score.first_name} ${score.last_name}`;
            document.getElementById('display-bib').textContent = score.bib_number;
            document.getElementById('display-team').textContent = score.team_name ?? '—';
            showScreen('screen-score');
        }

        function getEventShorthand(name) {
            const map = {
                'Floor': 'FX', 'Pommel Horse': 'PH', 'Rings': 'SR',
                'Vault': 'VT', 'Parallel Bars': 'PB', 'Horizontal Bar': 'HB',
                'Bars': 'UB', 'Beam': 'BB'
            };
            return map[name] ?? name;
        }

        function connectStream() {
            const es = new EventSource(`${API_BASE}/api/scores/score-stream/${eventId}`);

            es.onmessage = (e) => {
                const score = JSON.parse(e.data);
                enqueue(score);
            };

            es.onerror = () => {
                // Reconnection is handled automatically by EventSource.
                console.warn('Score stream connection lost, reconnecting...');
            };
        }

        document.getElementById('holding-event-name').textContent = getEventShorthand(
            eventName.split(' (')[0]
        );
        document.getElementById('score-topbar-event').textContent = getEventShorthand(
            eventName.split(' (')[0]
        );

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                localStorage.removeItem('display_event_id');
                localStorage.removeItem('display_duration');
                localStorage.removeItem('display_event_name');
                window.location.href = '/display_login.html';
            }
        });

        connectStream();
    </script>

</body>

</html>
